// ─── SOUND ENGINE ─────────────────────────────────────────────────────────────
const SFX = (() => {
  let ctx = null;
  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  };
  const tick = () => {
    const c = getCtx(); const osc = c.createOscillator(); const gain = c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type = "sine"; osc.frequency.setValueAtTime(880, c.currentTime);
    gain.gain.setValueAtTime(0.18, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
    osc.start(c.currentTime); osc.stop(c.currentTime + 0.08);
  };
  const warning = () => {
    const c = getCtx();
    [0, 0.18].forEach(delay => {
      const osc = c.createOscillator(); const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = "sine"; osc.frequency.setValueAtTime(440, c.currentTime + delay);
      gain.gain.setValueAtTime(0.28, c.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + 0.15);
      osc.start(c.currentTime + delay); osc.stop(c.currentTime + delay + 0.15);
    });
  };
  const pauseStart = () => {
    const c = getCtx(); const freqs = [523, 659];
    freqs.forEach((freq, i) => {
      const osc = c.createOscillator(); const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, c.currentTime + i * 0.12);
      gain.gain.setValueAtTime(0.2, c.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.12 + 0.6);
      osc.start(c.currentTime + i * 0.12); osc.stop(c.currentTime + i * 0.12 + 0.6);
    });
  };
  const go = () => {
    const c = getCtx(); const freqs = [392, 523, 659];
    freqs.forEach((freq, i) => {
      const osc = c.createOscillator(); const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = "triangle"; osc.frequency.setValueAtTime(freq, c.currentTime + i * 0.08);
      gain.gain.setValueAtTime(0.22, c.currentTime + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.08 + 0.5);
      osc.start(c.currentTime + i * 0.08); osc.stop(c.currentTime + i * 0.08 + 0.5);
    });
  };
  const gong = () => {
    const c = getCtx();
    const harmonics = [
      { freq: 110, gain: 0.35, decay: 2.5 }, { freq: 220, gain: 0.25, decay: 1.8 },
      { freq: 330, gain: 0.15, decay: 1.2 }, { freq: 440, gain: 0.10, decay: 0.9 },
      { freq: 880, gain: 0.06, decay: 0.5 },
    ];
    harmonics.forEach(({ freq, gain: g, decay }) => {
      const osc = c.createOscillator(); const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(g, c.currentTime + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + decay);
      osc.start(c.currentTime); osc.stop(c.currentTime + decay);
    });
  };
  return { tick, warning, pauseStart, go, gong };
})();

// ─── BREATHING TIMER ───────────────────────────────────────────────────────
function BreathingTimer(){
  const PHASES=[{label:"EINATMEN",sek:4,color:T.teal},{label:"HALTEN",sek:7,color:"#d4600a"},{label:"AUSATMEN",sek:8,color:"#2563a8"}];
  const TOTAL=19; const ROUNDS=8;
  const [active,setActive]=useState(false);
  const [round,setRound]=useState(1);
  const [elapsed,setElapsed]=useState(0);
  const [done,setDone]=useState(false);
  const ref=useRef(null);
  const getPhase=(e)=>{ if(e<4)return 0; if(e<11)return 1; return 2; };
  const phaseIdx=getPhase(elapsed);
  const cur=PHASES[phaseIdx];
  const phaseEnds=[4,11,19];
  const sekInPhase=phaseEnds[phaseIdx]-elapsed;
  useEffect(()=>{
    if(!active||done)return;
    ref.current=setTimeout(()=>{
      setElapsed(prev=>{
        const next=prev+1;
        if(next>=TOTAL){
          if(round>=ROUNDS){setDone(true);setActive(false);SFX.gong();return prev;}
          setRound(r=>r+1); SFX.go(); return 0;
        }
        const prevPhase=getPhase(prev); const nextPhase=getPhase(next);
        if(prevPhase!==nextPhase)SFX.go();
        else if(sekInPhase<=4)SFX.tick();
        return next;
      });
    },1000);
    return()=>clearTimeout(ref.current);
  },[active,elapsed,round,done]);
  const reset=()=>{setActive(false);setRound(1);setElapsed(0);setDone(false);clearInterval(ref.current);};
  const pct=(elapsed/TOTAL)*100; const R=60; const circ=2*Math.PI*R;
  return(
    <div style={{background:T.bg,border:`1.5px solid ${T.cardBorder}`,borderRadius:"14px",padding:"16px",marginTop:"12px",textAlign:"center"}}>
      {!active&&!done&&<button onClick={()=>setActive(true)} style={{width:"100%",padding:"13px",borderRadius:"10px",border:"none",background:T.teal,color:"#fff",fontSize:"15px",fontWeight:"700",cursor:"pointer",fontFamily:T.font}}>▶ 4-7-8 Timer starten (8 Runden)</button>}
      {(active||done)&&(
        <div>
          <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,marginBottom:"12px"}}>RUNDE {Math.min(round,ROUNDS)} / {ROUNDS}</div>
          <div style={{position:"relative",width:"140px",height:"140px",margin:"0 auto 8px"}}>
            <svg width="140" height="140" viewBox="0 0 140 140" style={{transform:"rotate(-90deg)"}}>
              <circle cx="70" cy="70" r={R} fill="none" stroke={T.cardBorder} strokeWidth="8"/>
              <circle cx="70" cy="70" r={R} fill="none" stroke={done?T.teal:cur.color} strokeWidth="8"
                strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-(elapsed%TOTAL)/TOTAL)}
                style={{transition:"stroke-dashoffset 0.9s linear,stroke 0.3s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              {done?<span style={{fontSize:"32px"}}>✓</span>:<>
                <div style={{fontSize:"32px",fontWeight:"800",color:cur.color,lineHeight:1}}>{sekInPhase}</div>
              </>}
            </div>
          </div>
          {!done&&<div style={{fontSize:"20px",fontWeight:"800",color:cur.color,letterSpacing:"2px",marginBottom:"12px",fontFamily:T.font}}>{cur.label}</div>}
          {!done&&<div style={{display:"flex",justifyContent:"center",gap:"8px",marginBottom:"14px"}}>
            {PHASES.map((p,i)=>(
              <div key={i} style={{padding:"4px 12px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",fontFamily:T.font,
                background:i===phaseIdx?p.color:"transparent",
                color:i===phaseIdx?"#fff":T.textMuted,
                border:`1.5px solid ${i===phaseIdx?p.color:T.cardBorder}`}}>
                {p.label} {p.sek}s
              </div>
            ))}
          </div>}
          {done&&<div style={{fontSize:"15px",fontWeight:"700",color:T.teal,marginBottom:"12px"}}>8 Runden geschafft 🎉</div>}
          <div style={{display:"flex",gap:"8px",justifyContent:"center"}}>
            {active&&<button onClick={()=>setActive(false)} style={{padding:"10px 20px",borderRadius:"9px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,fontSize:"14px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>⏸ Pause</button>}
            {!active&&!done&&<button onClick={()=>setActive(true)} style={{padding:"10px 20px",borderRadius:"9px",border:"none",background:T.teal,color:"#fff",fontSize:"14px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>▶ Weiter</button>}
            <button onClick={reset} style={{padding:"10px 20px",borderRadius:"9px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,fontSize:"14px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>↺ Reset</button>
          </div>
        </div>
      )}
    </div>
  );
}

function isPerSide(detail){ return /seite|je seite/i.test(detail); }
function parseSek(detail){ const m = detail.match(/(\d+)\s*[Ss]ek/); return m ? parseInt(m[1]) : 40; }

                <div key={i} style={{width:"22px",height:"7px",borderRadius:"4px",background:i < completedSets ? T.teal : T.cardBorder,transition:"background 0.2s",cursor:"pointer"}}/>
              ))}
              <span style={{fontSize:"11px",color:T.textMuted,marginLeft:"4px",fontFamily:T.font}}>{completedSets}/{totalSets}</span>

function parseDetail(detail){
  const m = detail.match(/(\d+)\s*[×x]\s*(\d+)\s*[Ss]ek/);
  if(m) return { sets: parseInt(m[1]), sek: parseInt(m[2]) };
  return null;
}

  const [sideSwitchCount,setSideSwitchCount]=useState(3);
  const sideSwitchRef=useRef(null);
  const ref=useRef(null);

  useEffect(()=>{
    if(!sideSwitch)return;
    if(sideSwitchCount>0){
      sideSwitchRef.current=setTimeout(()=>setSideSwitchCount(v=>v-1),1000);
    } else {
      setSideSwitch(false); setSideSwitchCount(3);
      const half=Math.floor(pendingSek/2);
      setTimerStart(half); setTimerSek(half); setRunning(true);
    }
    return()=>clearTimeout(sideSwitchRef.current);
  },[sideSwitch,sideSwitchCount]);

  useEffect(()=>{
    if(!running)return;
    if(timerSek>0){
      const half=Math.floor(pendingSek/2);
      if(overlayPerSide && timerPhase==="work" && timerSek===half && timerStart===pendingSek){
        clearTimeout(ref.current); setRunning(false); SFX.warning();
        setSideSwitch(true); setSideSwitchCount(3); return;
      }
      if(timerPhase==="prep" && timerSek<=3) SFX.tick();
      if(timerPhase==="work" && timerSek===10) SFX.warning();
      if(timerPhase==="work" && timerSek<=3 && timerSek>0) SFX.tick();
      if(timerPhase==="pause" && timerSek<=3 && timerSek>0) SFX.tick();
      ref.current=setTimeout(()=>setTimerSek(s=>s-1),1000);
    } else {
      if(timerPhase==="prep"){
        SFX.go(); setTimerPhase("work"); setTimerStart(pendingSek); setTimerSek(pendingSek); setIsPause(false); setRunning(true);
      } else if(timerPhase==="work"&&pauseSek>0){
        SFX.pauseStart(); setTimerPhase("pause"); setTimerStart(pauseSek); setTimerSek(pauseSek); setIsPause(true); setRunning(true);
      } else {
        SFX.gong(); setRunning(false); setIsPause(false);
        setTimeout(()=>{ setOverlayOpen(false); setTimerPhase("idle"); }, 1200);
      }
    }
    return()=>clearTimeout(ref.current);
  },[running,timerSek,timerPhase,pendingSek,pauseSek,overlayPerSide]);

  const openTimer=(sek,exName,perSide=false)=>{
    clearTimeout(ref.current); clearTimeout(sideSwitchRef.current);
    setSideSwitch(false); setSideSwitchCount(3);
    setOverlayExName(exName||""); setOverlayPerSide(perSide);
    setPendingSek(sek); setTimerPhase("prep"); setTimerStart(5); setTimerSek(5);
    setIsPause(false); setRunning(true); setOverlayOpen(true);
  };
  const closeOverlay=()=>{
    clearTimeout(ref.current); clearTimeout(sideSwitchRef.current);
    setSideSwitch(false); setSideSwitchCount(3);
    setRunning(false); setOverlayOpen(false); setTimerPhase("idle"); setIsPause(false);
  };

  const total=exercises.length;
  const totalDone=Object.values(done).filter(Boolean).length;
  const progress=Math.round((totalDone/total)*100);

  return(
    <div>
      {overlayOpen&&<TimerOverlay timerStart={timerStart} timerSek={timerSek} running={running}
        phase={timerPhase} exName={overlayExName} isPause={isPause} perSide={overlayPerSide}
        sideSwitch={sideSwitch} sideSwitchCount={sideSwitchCount}
        onToggle={()=>setRunning(v=>!v)}
        onReset={()=>{clearTimeout(ref.current);clearTimeout(sideSwitchRef.current);setSideSwitch(false);setSideSwitchCount(3);if(timerPhase==="prep"){setTimerSek(5);setTimerStart(5);}else if(isPause){setTimerSek(pauseSek);setTimerStart(pauseSek);}else{setTimerSek(pendingSek);setTimerStart(pendingSek);}setRunning(false);}}
        onClose={closeOverlay}/>}

      <div style={{marginBottom:"16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",fontWeight:"600",color:T.textSub,fontFamily:T.font,marginBottom:"7px"}}>
          <span>{totalDone} von {total} erledigt</span>
          <span style={{color:progress===100?T.teal:T.accent}}>{progress}%</span>
        </div>
        <div style={{height:"6px",background:T.cardBorder,borderRadius:"3px"}}>
          <div style={{height:"100%",width:`${progress}%`,background:progress===100?T.teal:T.accent,borderRadius:"3px",transition:"width 0.3s"}}/>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"12px 14px",background:T.card,borderRadius:"12px",border:`1px solid ${T.cardBorder}`,marginBottom:"14px",flexWrap:"wrap",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <span style={{fontSize:"12px",fontWeight:"700",letterSpacing:"1px",color:T.textMuted,fontFamily:T.font}}>TIMER</span>
        {[20,30,40,45,60,75,90].map(s=>(
          <button key={s} onClick={()=>openTimer(s,"")}
            style={{padding:"7px 14px",borderRadius:"8px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>{s}s</button>
        ))}
      </div>

      {phases.map(phase=>{
        const phEx=exercises.filter(e=>e.phase===phase);
        const phDone=phEx.filter(e=>done[e.id]).length;
        const isOpen=openPhase===phase;
        const c=PHASE_COLORS[phase]||T.accent;
        const complete=phDone===phEx.length;
        return(
          <div key={phase} style={{marginBottom:"10px",borderRadius:"12px",overflow:"hidden",border:`1.5px solid ${isOpen?c+"50":T.cardBorder}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div onClick={()=>setOpenPhase(isOpen?null:phase)} style={{display:"flex",alignItems:"center",gap:"12px",padding:"15px 16px",background:complete?"#f0faf8":T.card,cursor:"pointer"}}>
              <div style={{width:"4px",height:"32px",background:complete?T.teal:c,borderRadius:"2px",flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:"14px",fontWeight:"700",color:complete?T.teal:c,fontFamily:T.font}}>{phase}</div>
                <div style={{fontSize:"12px",color:T.textMuted,fontFamily:T.font,marginTop:"1px"}}>{phDone}/{phEx.length} Übungen</div>
              </div>
              <span style={{fontSize:"18px",color:T.textMuted,transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
            </div>
            {isOpen&&<div style={{background:T.card}}>
              {phEx.map(ex=><ExerciseCard key={ex.id} ex={ex} done={!!done[ex.id]} color={c}
                onToggle={()=>setDone(p=>({...p,[ex.id]:!p[ex.id]}))} onTimer={openTimer}/>)}
            </div>}
          </div>
        );
      })}

      <button onClick={()=>onComplete(done)}
        style={{width:"100%",marginTop:"16px",padding:"16px",borderRadius:"12px",border:"none",background:progress===100?T.accent:"#d4d0ca",color:progress===100?"#fff":T.textMuted,cursor:"pointer",fontSize:"16px",fontWeight:"700",fontFamily:T.font,transition:"all 0.2s"}}>
        {progress===100?"✓ Session abschließen":`Session abschließen (${progress}%)`}
      </button>
    </div>
  );
}

// ─── EXERCISE EDITOR ──────────────────────────────────────────────────────
function ExerciseEditor({exercises,setExercises}){
  const [editing,setEditing]=useState(null); const [form,setForm]=useState({});
  const phases=[...new Set(exercises.map(e=>e.phase))];
  const startEdit=ex=>{setEditing(ex.id);setForm({...ex});};
  const startAdd=()=>{const id=`custom-${Date.now()}`;setEditing("new");setForm({id,phase:phases[0],name:"",detail:"",emoji:"🏋️",ausfuehrung:"",warum:""});};
  const saveEdit=()=>{if(!form.name.trim())return;if(editing==="new")setExercises(p=>[...p,form]);else setExercises(p=>p.map(e=>e.id===editing?form:e));setEditing(null);};
  const iS={width:"100%",padding:"11px 13px",background:T.bg,border:`1.5px solid ${T.cardBorder}`,borderRadius:"9px",color:T.text,fontSize:"14px",outline:"none",boxSizing:"border-box",fontFamily:T.font};
  return(
    <div>
      {phases.map(phase=>(
        <div key={phase} style={{marginBottom:"18px"}}>
          <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:PHASE_COLORS[phase]||T.accent,textTransform:"uppercase",fontFamily:T.font,marginBottom:"8px"}}>{phase}</div>
          {exercises.filter(e=>e.phase===phase).map(ex=>(
            <div key={ex.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"13px 14px",background:T.card,borderRadius:"10px",marginBottom:"6px",border:`1px solid ${T.cardBorder}`}}>
              <span style={{fontSize:"20px"}}>{ex.emoji}</span>
              <div style={{flex:1}}><div style={{fontSize:"14px",fontWeight:"600",color:T.text,fontFamily:T.font}}>{ex.name}</div><div style={{fontSize:"12px",color:T.textMuted,fontFamily:T.font}}>{ex.detail}</div></div>
              <button onClick={()=>startEdit(ex)} style={{padding:"8px 14px",borderRadius:"8px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:T.font}}>✎</button>
              <button onClick={()=>setExercises(p=>p.filter(e=>e.id!==ex.id))} style={{padding:"8px 12px",borderRadius:"8px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:"#cc4444",cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:T.font}}>✕</button>
            </div>
          ))}
        </div>
      ))}
      {editing&&(
        <div style={{position:"fixed",inset:0,background:"rgba(245,244,242,0.95)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"16px"}}>
          <div style={{background:T.card,border:`1.5px solid ${T.cardBorder}`,borderRadius:"16px",padding:"24px",width:"100%",maxWidth:"400px",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.12)"}}>
            <div style={{fontSize:"13px",fontWeight:"700",letterSpacing:"2px",color:T.accent,marginBottom:"18px",fontFamily:T.font}}>ÜBUNG BEARBEITEN</div>
            {[["emoji","Emoji"],["name","Name"],["detail","Sets / Reps"],["ausfuehrung","Ausführung"],["warum","Warum diese Übung"]].map(([field,label])=>(
              <div key={field} style={{marginBottom:"12px"}}>
                <label style={{fontSize:"11px",fontWeight:"700",color:T.textMuted,display:"block",marginBottom:"5px",letterSpacing:"1px",fontFamily:T.font}}>{label.toUpperCase()}</label>
                {field.length>6?<textarea value={form[field]||""} onChange={e=>setForm(p=>({...p,[field]:e.target.value}))} rows={3} style={{...iS,resize:"vertical"}}/>:<input value={form[field]||""} onChange={e=>setForm(p=>({...p,[field]:e.target.value}))} style={iS}/>}
              </div>
            ))}
            <div style={{marginBottom:"18px"}}>
              <label style={{fontSize:"11px",fontWeight:"700",color:T.textMuted,display:"block",marginBottom:"5px",letterSpacing:"1px",fontFamily:T.font}}>PHASE</label>
              <select value={form.phase||""} onChange={e=>setForm(p=>({...p,phase:e.target.value}))} style={iS}>
                {phases.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={saveEdit} style={{flex:1,padding:"13px",borderRadius:"10px",border:"none",background:T.accent,color:"#fff",cursor:"pointer",fontFamily:T.font,fontSize:"15px",fontWeight:"700"}}>Speichern</button>
              <button onClick={()=>setEditing(null)} style={{flex:1,padding:"13px",borderRadius:"10px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,cursor:"pointer",fontFamily:T.font,fontSize:"15px",fontWeight:"600"}}>Abbrechen</button>
            </div>
          </div>
        </div>
      )}
      <button onClick={startAdd} style={{width:"100%",padding:"13px",borderRadius:"10px",border:`1.5px dashed ${T.cardBorder}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"14px",fontWeight:"600",marginTop:"8px",fontFamily:T.font}}>+ Übung hinzufügen</button>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("stretch");
  const [workoutEx,setWorkoutEx]=useState(DEFAULT_WORKOUT);
  const [stretchEx,setStretchEx]=useState(DEFAULT_STRETCH);
  const [loaded,setLoaded]=useState(false);
  const [editMode,setEditMode]=useState(null);
  const [pauseSek,setPauseSek]=useState(20);

  useEffect(()=>{
    (async()=>{
      const w=await load("kb4-workout-ex"), st=await load("kb4-stretch-ex");
      const settings=await load("kb4-settings");
      if(w)setWorkoutEx(w); if(st)setStretchEx(st);
      if(settings&&settings.pauseSek!=null)setPauseSek(settings.pauseSek);
      setLoaded(true);
    })();
  },[]);
  useEffect(()=>{if(loaded)save("kb4-workout-ex",workoutEx);},[workoutEx,loaded]);
  useEffect(()=>{if(loaded)save("kb4-stretch-ex",stretchEx);},[stretchEx,loaded]);
  useEffect(()=>{if(loaded)save("kb4-settings",{pauseSek});},[pauseSek,loaded]);

  const tabs=[
    {id:"workout",label:"Workout",icon:"🥊"},
    {id:"stretch",label:"Stretch",icon:"🧘"},
    {id:"quick",label:"10 Min",icon:"⚡"},
    {id:"edit",label:"Anpassen",icon:"✎"}
  ];

  if(!loaded)return<div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",color:T.textMuted,fontFamily:T.font,fontSize:"16px"}}>Lade…</div>;

  return(
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:T.font,paddingBottom:"72px"}}>
      <div style={{background:"#fff",borderBottom:`1px solid ${T.cardBorder}`,padding:"20px 20px 16px",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <div style={{maxWidth:"640px",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"3px",color:T.accent,textTransform:"uppercase",marginBottom:"4px"}}>Kickbox Training</div>
            <h1 style={{fontSize:"26px",fontWeight:"800",margin:0,color:T.text,letterSpacing:"-0.5px"}}>Trainer</h1>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"13px",fontWeight:"700",color:T.textSub,fontFamily:T.font}}>
              {new Date().toLocaleDateString("de-DE",{weekday:"long"})}
            </div>
            <div style={{fontSize:"22px",fontWeight:"800",color:T.text,fontFamily:T.font,lineHeight:1.1}}>
              {new Date().toLocaleDateString("de-DE",{day:"numeric",month:"long"})}
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:"640px",margin:"0 auto",padding:"18px 16px 0"}}>

        {tab==="workout"&&(
          <div>
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"2px",color:T.accent,marginBottom:"4px"}}>KICKBOXING · CALISTHENICS</div>
              <div style={{fontSize:"22px",fontWeight:"800",color:T.text}}>Full Body Workout</div>
            </div>
            <SessionView exercises={workoutEx} savedProgress={null} pauseSek={pauseSek} onComplete={()=>{}}/>
          </div>
        )}

        {tab==="stretch"&&(
          <div>
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"2px",color:T.teal,marginBottom:"4px"}}>MOBILITY · ABEND · ~23 MIN</div>
              <div style={{fontSize:"22px",fontWeight:"800",color:T.text}}>Stretch Routine v2</div>
              <div style={{fontSize:"13px",color:T.textMuted,marginTop:"4px"}}>Mo · Di · Fr · So</div>
            </div>
            <SessionView exercises={stretchEx} savedProgress={null} pauseSek={pauseSek} onComplete={()=>{}}/>
          </div>
        )}

        {tab==="quick"&&(
          <div>
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"2px",color:T.teal,marginBottom:"4px"}}>MOBILITY · ~10 MIN</div>
              <div style={{fontSize:"22px",fontWeight:"800",color:T.text}}>Kurzroutine</div>
            </div>
            <SessionView exercises={SHORT_STRETCH} savedProgress={null} pauseSek={pauseSek} onComplete={()=>{}}/>
          </div>
        )}

        {tab==="edit"&&(
          <div>
            <div style={{background:T.card,borderRadius:"14px",border:`1px solid ${T.cardBorder}`,padding:"20px",marginBottom:"20px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",fontFamily:T.font,marginBottom:"16px"}}>Einstellungen</div>
              <div>
                <div style={{fontSize:"13px",fontWeight:"700",color:T.text,fontFamily:T.font,marginBottom:"10px"}}>Automatische Pause nach Timer</div>
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                  {[0,10,15,20,30,45].map(s=>(
                    <button key={s} onClick={()=>setPauseSek(s)}
                      style={{padding:"9px 16px",borderRadius:"9px",border:`1.5px solid ${pauseSek===s?T.orange:T.cardBorder}`,background:pauseSek===s?T.orangeLight:T.bg,color:pauseSek===s?T.orange:T.textSub,cursor:"pointer",fontSize:"13px",fontWeight:"700",fontFamily:T.font}}>
                      {s===0?"Aus":`${s}s`}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:"12px",color:T.textMuted,fontFamily:T.font,marginTop:"8px"}}>{pauseSek>0?`Nach jeder Übung: ${pauseSek} Sek. Pause automatisch.`:"Kein automatischer Pause-Timer."}</div>
              </div>
            </div>

            <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",marginBottom:"14px"}}>Übungen anpassen</div>
            <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
              {[["workout","🥊 Workout"],["stretch","🧘 Stretch"]].map(([mode,label])=>(
                <button key={mode} onClick={()=>setEditMode(mode)} style={{flex:1,padding:"12px",borderRadius:"10px",border:`1.5px solid ${editMode===mode?T.accent:T.cardBorder}`,background:editMode===mode?T.accentLight:T.card,color:editMode===mode?T.accent:T.textSub,cursor:"pointer",fontSize:"14px",fontWeight:"700",fontFamily:T.font}}>{label}</button>
              ))}
            </div>
            {editMode==="workout"&&<ExerciseEditor exercises={workoutEx} setExercises={setWorkoutEx}/>}
            {editMode==="stretch"&&<ExerciseEditor exercises={stretchEx} setExercises={setStretchEx}/>}

            <div style={{marginTop:"20px",background:"#fff5f5",border:`1.5px solid #fca5a5`,borderRadius:"14px",padding:"16px 20px"}}>
              <div style={{fontSize:"13px",fontWeight:"700",color:T.accent,fontFamily:T.font,marginBottom:"6px"}}>Übungen zurücksetzen</div>
              <div style={{fontSize:"12px",color:T.textSub,fontFamily:T.font,marginBottom:"12px"}}>Setzt Workout und Stretch auf die Standard-Übungen zurück.</div>
              <button onClick={()=>{
                if(window.confirm("Übungen wirklich zurücksetzen? Eigene Änderungen gehen verloren.")){
                  setWorkoutEx(DEFAULT_WORKOUT);
                  setStretchEx(DEFAULT_STRETCH);
                }
              }} style={{padding:"10px 20px",borderRadius:"9px",border:"none",background:T.accent,color:"#fff",cursor:"pointer",fontSize:"13px",fontWeight:"700",fontFamily:T.font}}>
                ↺ Zurücksetzen
              </button>
            </div>
          </div>
        )}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.navBg,borderTop:`1px solid ${T.navBorder}`,display:"flex",zIndex:50,boxShadow:"0 -2px 10px rgba(0,0,0,0.06)"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,padding:"10px 4px 13px",border:"none",background:"transparent",color:tab===t.id?T.accent:T.textMuted,cursor:"pointer",fontFamily:T.font,borderTop:`3px solid ${tab===t.id?T.accent:"transparent"}`,transition:"all 0.15s"}}>
            <div style={{fontSize:"18px",marginBottom:"3px"}}>{t.icon}</div>
            <div style={{fontSize:"10px",fontWeight:"700",letterSpacing:"0.5px"}}>{t.label.toUpperCase()}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>

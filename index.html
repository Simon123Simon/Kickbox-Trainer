// ─── SOUND ENGINE (Web Audio API) ─────────────────────────────────────────────
const SFX = (() => {
  let ctx = null;
  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  };

  // Short click tick for each countdown second
  const tick = () => {
    const c = getCtx();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.connect(gain); gain.connect(c.destination);
    osc.type = "sine"; osc.frequency.setValueAtTime(880, c.currentTime);
    gain.gain.setValueAtTime(0.18, c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
    osc.start(c.currentTime); osc.stop(c.currentTime + 0.08);
  };

  // Urgent double-beep at 10 seconds warning
  const warning = () => {
    const c = getCtx();
    [0, 0.18].forEach(delay => {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = "sine"; osc.frequency.setValueAtTime(440, c.currentTime + delay);
      gain.gain.setValueAtTime(0.28, c.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + 0.15);
      osc.start(c.currentTime + delay); osc.stop(c.currentTime + delay + 0.15);
    });
  };

  // Soft chime when pause starts
  const pauseStart = () => {
    const c = getCtx();
    const freqs = [523, 659]; // C5, E5
    freqs.forEach((freq, i) => {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, c.currentTime + i * 0.12);
      gain.gain.setValueAtTime(0.2, c.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.12 + 0.6);
      osc.start(c.currentTime + i * 0.12); osc.stop(c.currentTime + i * 0.12 + 0.6);
    });
  };

  // GO! sound when workout timer starts
  const go = () => {
    const c = getCtx();
    const freqs = [392, 523, 659]; // G4, C5, E5
    freqs.forEach((freq, i) => {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = "triangle"; osc.frequency.setValueAtTime(freq, c.currentTime + i * 0.08);
      gain.gain.setValueAtTime(0.22, c.currentTime + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.08 + 0.5);
      osc.start(c.currentTime + i * 0.08); osc.stop(c.currentTime + i * 0.08 + 0.5);
    });
  };

  // Gong at end of timer – layered harmonics with long decay
  const gong = () => {
    const c = getCtx();
    const harmonics = [
      { freq: 110, gain: 0.35, decay: 2.5 },
      { freq: 220, gain: 0.25, decay: 1.8 },
      { freq: 330, gain: 0.15, decay: 1.2 },
      { freq: 440, gain: 0.10, decay: 0.9 },
      { freq: 880, gain: 0.06, decay: 0.5 },
    ];
    harmonics.forEach(({ freq, gain: g, decay }) => {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(g, c.currentTime + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + decay);
      osc.start(c.currentTime); osc.stop(c.currentTime + decay);
    });
  };

  return { tick, warning, pauseStart, go, gong };
})();

// ─── HEATMAP ───────────────────────────────────────────────────────────────
function Heatmap({history}){
  const weeks=[];const end=new Date();let cur=new Date(end);cur.setDate(cur.getDate()-181);
  while(cur.getDay()!==1)cur.setDate(cur.getDate()-1);
  while(cur<=end){const week=[];for(let d=0;d<7;d++){const key=toDateKey(cur);const e=history[key];week.push({key,date:new Date(cur),count:e?(e.workout?1:0)+(e.stretch?1:0):0,workout:!!(e&&e.workout),stretch:!!(e&&e.stretch)});cur.setDate(cur.getDate()+1);}weeks.push(week);}
  const gap=3;

  // Build month labels: one label per month, placed at the first week of that month
  const monthLabels = weeks.map((week, wi) => {
    const firstDay = week[0].date;
    // Show label only on the first week where this month appears
    const prevWeek = weeks[wi - 1];
    const isFirstWeekOfMonth = !prevWeek || prevWeek[0].date.getMonth() !== firstDay.getMonth();
    return isFirstWeekOfMonth ? MONTHS[firstDay.getMonth()] : "";
  });

  // Alternating month background for columns
  let monthIndex = 0;
  const weekMonthIndex = weeks.map((week, wi) => {
    if (wi > 0 && weeks[wi-1][0].date.getMonth() !== week[0].date.getMonth()) monthIndex++;
    return monthIndex;
  });
  const monthBg = ["#f0eeeb", "#e8e5e0"]; // subtle alternation

  return(
    <div>
      <div style={{display:"flex",gap:`${gap}px`}}>
        <div style={{display:"flex",flexDirection:"column",gap:`${gap}px`,paddingTop:"20px",marginRight:"2px"}}>
          {WEEKDAYS.map((d,i)=><div key={d} style={{height:"14px",fontSize:"10px",color:T.textMuted,lineHeight:"14px",width:"18px",textAlign:"right",fontFamily:T.font}}>{i%2===0?d:""}</div>)}
        </div>
        <div style={{flex:1,minWidth:0}}>
          {/* Month labels */}
          <div style={{display:"flex",gap:`${gap}px`,marginBottom:"4px",height:"16px"}}>
            {weeks.map((week,wi)=>(
              <div key={wi} style={{flex:1,fontSize:"10px",color:T.textMuted,overflow:"visible",whiteSpace:"nowrap",fontFamily:T.font,fontWeight:monthLabels[wi]?"700":"400"}}>
                {monthLabels[wi]}
              </div>
            ))}
          </div>
          {/* Columns */}
          <div style={{display:"flex",gap:`${gap}px`}}>
            {weeks.map((week,wi)=>(
              <div key={wi} style={{flex:1,display:"flex",flexDirection:"column",gap:`${gap}px`,background:monthBg[weekMonthIndex[wi]%2],borderRadius:"3px",padding:"2px 1px"}}>
                {week.map(c=>(
                  <div key={c.key} title={c.key} style={{
                    paddingBottom:"100%",position:"relative",borderRadius:"3px",
                  background:c.workout&&c.stretch?T.accent:c.workout?"#f5a0a8":c.stretch?T.teal:"transparent",
                    outline:c.key===today()?`2px solid ${T.accent}`:"none",
                    outlineOffset:"1px"
                  }}/>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:"14px",marginTop:"10px",flexWrap:"wrap"}}>
        {[["#e8e5e0","Kein Training"],["#f5a0a8","Workout"],[T.teal,"Stretch"],[T.accent,"Beides"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",gap:"6px",alignItems:"center"}}>
            <div style={{width:"12px",height:"12px",borderRadius:"3px",background:c}}/>
            <span style={{fontSize:"11px",color:T.textMuted,fontFamily:T.font}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── BREATHING TIMER ───────────────────────────────────────────────────────
function BreathingTimer(){
  const PHASES=[{label:"Einatmen",sek:4,color:T.teal},{label:"Halten",sek:7,color:"#d4600a"},{label:"Ausatmen",sek:8,color:"#2563a8"}];
  const ROUNDS=8;
  const [active,setActive]=useState(false);
  const [round,setRound]=useState(1);
  const [phaseIdx,setPhaseIdx]=useState(0);
  const [sek,setSek]=useState(PHASES[0].sek);
  const [done,setDone]=useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    if(!active||done)return;
    ref.current=setInterval(()=>{
      setSek(prev=>{
        if(prev<=1){
          // next phase or next round
          const nextPh=(phaseIdx+1)%3;
          if(nextPh===0){
            if(round>=ROUNDS){setDone(true);setActive(false);SFX.gong();clearInterval(ref.current);return 0;}
            setRound(r=>r+1);
          }
          setPhaseIdx(nextPh);
          SFX.go();
          return PHASES[nextPh].sek;
        }
        if(prev===4)SFX.warning();
        SFX.tick();
        return prev-1;
      });
    },1000);
    return()=>clearInterval(ref.current);
  },[active,phaseIdx,round,done]);

  const reset=()=>{setActive(false);setRound(1);setPhaseIdx(0);setSek(PHASES[0].sek);setDone(false);clearInterval(ref.current);};
  const cur=PHASES[phaseIdx];
  const pct=sek/cur.sek;
  const R=60;const circ=2*Math.PI*R;

  return(
    <div style={{background:T.bg,border:`1.5px solid ${T.cardBorder}`,borderRadius:"14px",padding:"16px",marginTop:"12px",textAlign:"center"}}>
      {!active&&!done&&<button onClick={()=>setActive(true)} style={{width:"100%",padding:"13px",borderRadius:"10px",border:"none",background:T.teal,color:"#fff",fontSize:"15px",fontWeight:"700",cursor:"pointer",fontFamily:T.font}}>▶ 4-7-8 Timer starten (8 Runden)</button>}
      {(active||done)&&(
        <div>
          <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,marginBottom:"12px"}}>RUNDE {Math.min(round,ROUNDS)} / {ROUNDS}</div>
          <div style={{position:"relative",width:"140px",height:"140px",margin:"0 auto 12px"}}>
            <svg width="140" height="140" viewBox="0 0 140 140" style={{transform:"rotate(-90deg)"}}>
              <circle cx="70" cy="70" r={R} fill="none" stroke={T.cardBorder} strokeWidth="8"/>
              <circle cx="70" cy="70" r={R} fill="none" stroke={done?T.teal:cur.color} strokeWidth="8"
                strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
                style={{transition:"stroke-dashoffset 0.9s linear,stroke 0.3s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              {done?<span style={{fontSize:"32px"}}>✓</span>:<>
                <div style={{fontSize:"32px",fontWeight:"800",color:cur.color,lineHeight:1}}>{sek}</div>
                <div style={{fontSize:"12px",fontWeight:"700",color:cur.color,marginTop:"2px"}}>{cur.label.toUpperCase()}</div>
              </>}
            </div>
          </div>
          {done&&<div style={{fontSize:"15px",fontWeight:"700",color:T.teal,marginBottom:"12px"}}>8 Runden geschafft 🎉</div>}
          <div style={{display:"flex",gap:"8px",justifyContent:"center"}}>
            {active&&<button onClick={()=>setActive(false)} style={{padding:"10px 20px",borderRadius:"9px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,fontSize:"14px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>⏸ Pause</button>}
            {!active&&!done&&<button onClick={()=>setActive(true)} style={{padding:"10px 20px",borderRadius:"9px",border:"none",background:T.teal,color:"#fff",fontSize:"14px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>▶ Weiter</button>}
            <button onClick={reset} style={{padding:"10px 20px",borderRadius:"9px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,fontSize:"14px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>↺ Reset</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── EXERCISE CARD ─────────────────────────────────────────────────────────
// Parse how many sets an exercise has from its detail string
// "2 × 45 Sek." → 2   |  "3 × 30 Sek./Seite" → 3   |  "8 Wdh." → 1
function parseSets(detail){
  const m = detail.match(/^(\d+)\s*[×x]/);
  return m ? parseInt(m[1]) : 1;
}
// Detect /Seite or je Seite in detail
function isPerSide(detail){
  return /seite|je seite/i.test(detail);
}
// Extract seconds from detail for timer button default
function parseSek(detail){
  const m = detail.match(/(\d+)\s*[Ss]ek/);
  return m ? parseInt(m[1]) : 40;
}

function ExerciseCard({ex,done,onToggle,onTimer,color}){
  const [open,setOpen]=useState(false);
  const [imgErr,setImgErr]=useState(false);
  const totalSets = parseSets(ex.detail);
  const perSide = isPerSide(ex.detail);
  const defaultSek = parseSek(ex.detail);
  // double timer duration for per-side exercises
  const timerSek = perSide ? defaultSek * 2 : defaultSek;
  const [completedSets, setCompletedSets] = useState(0);

  const handleSetClick = (e) => {
    e.stopPropagation();
    setCompletedSets(prev => {
      const next = prev < totalSets ? prev + 1 : 0; // cycle back on full
      if(next === totalSets) onToggle(); // auto-check when all sets done
      return next;
    });
  };

  return(
    <div style={{borderTop:`1px solid ${T.cardBorder}`}}>
      <div onClick={()=>setOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:"12px",padding:"14px 16px",cursor:"pointer",background:done?"#fafaf8":T.card}}>
        <span style={{fontSize:"22px",opacity:done?0.4:1,flexShrink:0}}>{ex.emoji}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:"15px",fontWeight:"600",color:done?T.textMuted:T.text,textDecoration:done?"line-through":"none",fontFamily:T.font,marginBottom:"4px"}}>{ex.name}</div>
          <div style={{fontSize:"13px",color:color,fontFamily:T.font,fontWeight:"500",marginBottom: totalSets>1?"6px":"0"}}>{ex.detail}{perSide?" · ⚠️ Seitenwechsel bei Halbzeit":""}</div>
          {/* Set tracking dots */}
          {totalSets > 1 && (
            <div style={{display:"flex",gap:"5px",alignItems:"center"}} onClick={handleSetClick}>
              {Array.from({length:totalSets}).map((_,i)=>(
                <div key={i} style={{
                  width:"22px",height:"7px",borderRadius:"4px",
                  background: i < completedSets ? T.teal : T.cardBorder,
                  transition:"background 0.2s",cursor:"pointer"
                }}/>
              ))}
              <span style={{fontSize:"11px",color:T.textMuted,marginLeft:"4px",fontFamily:T.font}}>
                {completedSets}/{totalSets}
              </span>
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:"8px",alignItems:"center",flexShrink:0}}>
          <span style={{fontSize:"16px",color:T.textMuted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
          <button onClick={e=>{e.stopPropagation();onTimer(timerSek,ex.name,perSide);}}
            style={{width:"44px",height:"44px",borderRadius:"10px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,cursor:"pointer",fontSize:"18px",display:"flex",alignItems:"center",justifyContent:"center"}}>⏱</button>
          <button onClick={e=>{e.stopPropagation();onToggle();}}
            style={{width:"44px",height:"44px",borderRadius:"10px",border:`1.5px solid ${done?T.teal:T.cardBorder}`,background:done?T.tealLight:T.bg,color:done?T.teal:T.textMuted,cursor:"pointer",fontSize:"20px",fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center"}}>✓</button>
        </div>
      </div>
      {open&&(
        <div style={{padding:"0 16px 18px",background:"#fdfcfb",borderTop:`1px solid ${T.cardBorder}`}}>
          {ex.img&&!imgErr&&<div style={{margin:"14px 0 12px",borderRadius:"10px",overflow:"hidden",height:"180px"}}><img src={ex.img} alt={ex.name} onError={()=>setImgErr(true)} style={{width:"100%",height:"180px",objectFit:"cover",display:"block"}}/></div>}
          <div style={{marginTop:ex.img&&!imgErr?0:"14px",marginBottom:"12px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"1.5px",color:T.textMuted,textTransform:"uppercase",fontFamily:T.font,marginBottom:"6px"}}>Ausführung</div>
            <p style={{fontSize:"14px",lineHeight:"1.65",color:T.textSub,margin:0,fontFamily:T.font}}>{ex.ausfuehrung}</p>
          </div>
          {perSide&&(
            <div style={{background:"#fff8e6",border:"1.5px solid #f5c842",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",display:"flex",gap:"8px",alignItems:"flex-start"}}>
              <span style={{fontSize:"18px"}}>⚠️</span>
              <p style={{fontSize:"13px",color:"#7a5800",margin:0,fontFamily:T.font,lineHeight:1.5}}>
                <strong>Seitenwechsel bei Halbzeit!</strong> Timer läuft {timerSek}s gesamt – nach {defaultSek}s die Seite wechseln.
              </p>
            </div>
          )}
          <div style={{background:`${color}12`,border:`1.5px solid ${color}30`,borderRadius:"10px",padding:"12px 14px",marginBottom:ex.variante?"12px":0}}>
            <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"1.5px",color:color,textTransform:"uppercase",fontFamily:T.font,marginBottom:"5px"}}>Kickbox-Relevanz</div>

          {ex.muskeln&&<div style={{marginTop:"12px",display:"flex",flexWrap:"wrap",gap:"6px"}}>{ex.muskeln.map(m=><span key={m} style={{fontSize:"12px",color:T.textSub,background:T.bg,border:`1px solid ${T.cardBorder}`,padding:"4px 10px",borderRadius:"20px",fontFamily:T.font}}>{m}</span>)}</div>}
          {ex.breathing&&<BreathingTimer/>}
        </div>
      )}
    </div>
  );
}

// ─── TIMER OVERLAY ─────────────────────────────────────────────────────────
function TimerOverlay({timerStart,timerSek,running,phase,exName,isPause,perSide,onToggle,onReset,onClose}){
  const isPrep=phase==="prep";
  const isDone=phase==="idle";
  const pct=timerStart>0?(timerSek/timerStart)*100:100;
  const R=100;const circ=2*Math.PI*R;
  const tColor=isPause?"#2563a8":isPrep?"#d4600a":timerSek>timerStart*0.5?T.teal:timerSek>timerStart*0.25?"#d4600a":T.accent;

  // Side-change alert: show when exactly at halfway of work phase
  const halfTime = Math.floor(timerStart / 2);
  const showSideChange = perSide && !isPause && !isPrep && timerSek === halfTime;

  // 3-second side-change countdown
  const [sideCountdown, setSideCountdown] = useState(null);
  useEffect(()=>{
    if(showSideChange){
      setSideCountdown(3);
    }
  },[showSideChange]);
  useEffect(()=>{
    if(sideCountdown===null||sideCountdown<=0){setSideCountdown(null);return;}
    const t=setTimeout(()=>setSideCountdown(v=>v-1),1000);
    return()=>clearTimeout(t);
  },[sideCountdown]);
  const showSideBanner = perSide && !isPause && !isPrep && sideCountdown !== null && sideCountdown > 0;

  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(245,244,242,0.97)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:T.font}}>
      <div style={{position:"absolute",inset:0,background:`radial-gradient(ellipse 70% 60% at 50% 50%, ${tColor}15 0%, transparent 70%)`,transition:"background 0.6s",pointerEvents:"none"}}/>

      {/* Side-change flash with 3s countdown */}
      {showSideBanner&&(
        <div style={{position:"absolute",top:"18%",left:"50%",transform:"translateX(-50%)",background:"#fff8e6",border:"2px solid #f5c842",borderRadius:"14px",padding:"14px 28px",zIndex:10,textAlign:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.12)"}}>
          <div style={{fontSize:"22px",marginBottom:"4px"}}>⚠️</div>
          <div style={{fontSize:"15px",fontWeight:"700",color:"#7a5800",fontFamily:T.font}}>Seite wechseln!</div>
          <div style={{fontSize:"36px",fontWeight:"800",color:"#f5c842",lineHeight:1,marginTop:"6px"}}>{sideCountdown}</div>
        </div>
      )}

      <div style={{position:"relative",textAlign:"center",marginBottom:"16px"}}>
        <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"3px",color:tColor,textTransform:"uppercase",marginBottom:"8px",transition:"color 0.4s"}}>
          {isPause?"PAUSE":isPrep?"VORBEREITUNG":"AM LAUFEN"}
        </div>
        <div style={{fontSize:"clamp(18px,4vw,24px)",fontWeight:"600",color:T.text,maxWidth:"300px",textAlign:"center",lineHeight:1.3}}>{exName}</div>
        {perSide&&!isPause&&!isPrep&&(
          <div style={{fontSize:"12px",color:T.textMuted,marginTop:"6px"}}>
            {timerSek > halfTime ? `Linke/Rechte Seite · noch ${timerSek-halfTime}s` : `Seite gewechselt · noch ${timerSek}s`}
          </div>
        )}
      </div>
      <div style={{position:"relative",width:"240px",height:"240px",marginBottom:"36px"}}>
        <svg width="240" height="240" viewBox="0 0 240 240" style={{transform:"rotate(-90deg)",position:"absolute",inset:0}}>
          <circle cx="120" cy="120" r={R} fill="none" stroke={T.cardBorder} strokeWidth="10"/>
          <circle cx="120" cy="120" r={R} fill="none" stroke={tColor} strokeWidth="10" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
            style={{transition:"stroke-dashoffset 1s linear, stroke 0.4s ease"}}/>
          {/* Halfway marker for per-side */}
          {perSide&&!isPause&&!isPrep&&(
            <line x1="120" y1="20" x2="120" y2="35" stroke="#f5c842" strokeWidth="3"
              transform={`rotate(0, 120, 120)`}/>
          )}
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:"80px",fontWeight:"700",color:tColor,lineHeight:1,transition:"color 0.4s",fontFamily:T.font}}>{timerSek}</div>
          <div style={{fontSize:"13px",fontWeight:"600",color:T.textMuted,letterSpacing:"2px",marginTop:"6px"}}>
            {isPause?"SEK PAUSE":isPrep?"SEK BIS START":`VON ${timerStart}s`}
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:"16px",position:"relative",alignItems:"center"}}>
        <button onClick={onReset} style={{width:"56px",height:"56px",borderRadius:"50%",border:`1.5px solid ${T.cardBorder}`,background:T.card,color:T.textSub,cursor:"pointer",fontSize:"20px",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>↺</button>
        <button onClick={onToggle} style={{width:"80px",height:"80px",borderRadius:"50%",border:"none",background:tColor,color:"#fff",cursor:"pointer",fontSize:"28px",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 20px ${tColor}50`,transition:"background 0.4s"}}>
          {running?"⏸":"▶"}
        </button>
        <button onClick={onClose} style={{width:"56px",height:"56px",borderRadius:"50%",border:`1.5px solid ${T.cardBorder}`,background:T.card,color:T.textSub,cursor:"pointer",fontSize:"18px",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>✕</button>
      </div>
      <div style={{marginTop:"20px",fontSize:"12px",color:T.textMuted,letterSpacing:"1px"}}>
        {isPause?"Fenster schließt automatisch":"🔔 Ton · ✕ zum Schließen"}
      </div>
    </div>
  );
}

// ─── PARSE DETAIL STRING → { sets, sek } ──────────────────────────────────
// "3 × 30 Sek." → {sets:3, sek:30}  |  "2 × 20 Sek." → {sets:2, sek:20}
// "8 Wdh." or "10 × je Seite" → null (no auto-time)
function parseDetail(detail){
  const m = detail.match(/(\d+)\s*[×x]\s*(\d+)\s*[Ss]ek/);
  if(m) return { sets: parseInt(m[1]), sek: parseInt(m[2]) };
  return null;
}

// ─── WARM-UP AUTORUN OVERLAY ───────────────────────────────────────────────
function WarmupOverlay({ exercises, onDone, pauseSek }) {
  // Build a flat queue: [{exId, exName, emoji, set, totalSets, sek}] for timed ex,
  // or [{exId, exName, emoji, set, totalSets, sek:null}] for manual ones
  const queue = [];
  exercises.forEach(ex => {
    const parsed = parseDetail(ex.detail);
    if (parsed) {
      for (let s = 1; s <= parsed.sets; s++) {
        queue.push({ exId: ex.id, exName: ex.name, emoji: ex.emoji, set: s, totalSets: parsed.sets, sek: parsed.sek });
      }
    } else {
      queue.push({ exId: ex.id, exName: ex.name, emoji: ex.emoji, set: 1, totalSets: 1, sek: null });
    }
  });

  const [idx, setIdx] = useState(0);           // current queue position
  const [phase, setPhase] = useState("prep");   // prep | work | pause | manual
  const [timerSek, setTimerSek] = useState(5);
  const [timerStart, setTimerStart] = useState(5);
  const [running, setRunning] = useState(true);
  const [donedIds, setDoneIds] = useState({});
  const ref = useRef(null);

  const current = queue[idx] || null;

  // When idx changes, set up new step
  useEffect(() => {
    clearTimeout(ref.current);
    if (!current) return;
    if (current.sek === null) {
      setPhase("manual"); setRunning(false);
    } else {
      // Only show 5s prep before the FIRST set of each exercise
      const prev = queue[idx - 1];
      const sameEx = prev && prev.exId === current.exId;
      if (sameEx) {
        // Skip prep, go straight to work
        SFX.go();
        setPhase("work"); setTimerStart(current.sek); setTimerSek(current.sek); setRunning(true);
      } else {
        setPhase("prep"); setTimerStart(5); setTimerSek(5); setRunning(true);
      }
    }
  }, [idx]);

  useEffect(() => {
    if (!running || phase === "manual") return;
    if (timerSek > 0) {
      if (phase === "prep" && timerSek <= 3) SFX.tick();
      if (phase === "work" && timerSek === 10) SFX.warning();
      if (phase === "work" && timerSek <= 3) SFX.tick();
      if (phase === "pause" && timerSek <= 3) SFX.tick();
      ref.current = setTimeout(() => setTimerSek(s => s - 1), 1000);
    } else {
      if (phase === "prep") {
        SFX.go();
        setPhase("work"); setTimerStart(current.sek); setTimerSek(current.sek);
      } else if (phase === "work") {
        // Mark ex done
        setDoneIds(p => ({ ...p, [current.exId]: true }));
        const isLastSetOfEx = current.set === current.totalSets;
        const isLastItem = idx === queue.length - 1;
        if (isLastItem) {
          SFX.gong();
          setTimeout(() => { onDone(Object.fromEntries(exercises.map(e => [e.id, true]))); }, 800);
        } else if (pauseSek > 0) {
          SFX.pauseStart();
          setPhase("pause"); setTimerStart(pauseSek); setTimerSek(pauseSek);
        } else {
          setIdx(i => i + 1);
        }
      } else if (phase === "pause") {
        setIdx(i => i + 1);
      }
    }
    return () => clearTimeout(ref.current);
  }, [running, timerSek, phase]);

  const advanceManual = () => {
    setDoneIds(p => ({ ...p, [current.exId]: true }));
    if (idx < queue.length - 1) setIdx(i => i + 1);
    else { SFX.gong(); setTimeout(() => { onDone(Object.fromEntries(exercises.map(e => [e.id, true]))); }, 800); }
  };

  if (!current) return null;

  const pct = timerStart > 0 ? (timerSek / timerStart) * 100 : 100;
  const R = 100; const circ = 2 * Math.PI * R;
  const tColor = phase === "pause" ? "#2563a8" : phase === "prep" ? T.orange :
    timerSek > (current.sek || 1) * 0.5 ? T.teal : timerSek > (current.sek || 1) * 0.25 ? T.orange : T.accent;

  // Progress across whole queue
  const qPct = Math.round((idx / queue.length) * 100);

  const phaseLabel = { prep: "VORBEREITUNG", work: "LOS!", pause: "PAUSE", manual: "DEINE RUNDE" }[phase];

  return (
    <div style={{ position:"fixed", inset:0, zIndex:200, background:"rgba(245,244,242,0.97)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:T.font }}>
      <div style={{ position:"absolute", inset:0, background:`radial-gradient(ellipse 70% 60% at 50% 50%, ${tColor}15 0%, transparent 70%)`, transition:"background 0.6s", pointerEvents:"none" }}/>

      {/* Top progress bar */}
      <div style={{ position:"absolute", top:0, left:0, right:0, height:"4px", background:T.cardBorder }}>
        <div style={{ height:"100%", width:`${qPct}%`, background:T.accent, transition:"width 0.4s" }}/>
      </div>

      {/* Step counter */}
      <div style={{ position:"absolute", top:"16px", left:0, right:0, textAlign:"center", fontSize:"12px", fontWeight:"700", color:T.textMuted, letterSpacing:"2px" }}>
        WARM-UP · {idx + 1} / {queue.length}
      </div>

      {/* Exercise info */}
      <div style={{ textAlign:"center", marginBottom:"16px", padding:"0 24px" }}>
        <div style={{ fontSize:"11px", fontWeight:"700", letterSpacing:"3px", color:tColor, textTransform:"uppercase", marginBottom:"8px", transition:"color 0.4s" }}>{phaseLabel}</div>
        <div style={{ fontSize:"36px", marginBottom:"8px" }}>{current.emoji}</div>
        <div style={{ fontSize:"clamp(20px,4vw,26px)", fontWeight:"800", color:T.text, lineHeight:1.2 }}>{current.exName}</div>
        {current.totalSets > 1 && (
          <div style={{ fontSize:"14px", fontWeight:"600", color:T.textMuted, marginTop:"6px" }}>
            Satz {current.set} von {current.totalSets}
          </div>
        )}
      </div>

      {/* Ring or manual */}
      {phase === "manual" ? (
        <div style={{ marginBottom:"36px", textAlign:"center" }}>
          <div style={{ fontSize:"14px", color:T.textSub, marginBottom:"24px", maxWidth:"260px", lineHeight:1.5 }}>
            Führe die Übung durch, dann weiter tippen.
          </div>
          <button onClick={advanceManual}
            style={{ width:"140px", height:"140px", borderRadius:"50%", border:"none", background:T.teal, color:"#fff", cursor:"pointer", fontSize:"36px", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto", boxShadow:`0 4px 24px ${T.teal}50` }}>
            ▶
          </button>
        </div>
      ) : (
        <div style={{ position:"relative", width:"240px", height:"240px", marginBottom:"36px" }}>
          <svg width="240" height="240" viewBox="0 0 240 240" style={{ transform:"rotate(-90deg)", position:"absolute", inset:0 }}>
            <circle cx="120" cy="120" r={R} fill="none" stroke={T.cardBorder} strokeWidth="10"/>
            <circle cx="120" cy="120" r={R} fill="none" stroke={tColor} strokeWidth="10" strokeLinecap="round"
              strokeDasharray={circ} strokeDashoffset={circ * (1 - pct / 100)}
              style={{ transition:"stroke-dashoffset 1s linear, stroke 0.4s ease" }}/>
          </svg>
          <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
            <div style={{ fontSize:"80px", fontWeight:"700", color:tColor, lineHeight:1, transition:"color 0.4s" }}>{timerSek}</div>
            <div style={{ fontSize:"13px", fontWeight:"600", color:T.textMuted, letterSpacing:"2px", marginTop:"6px" }}>
              {phase === "prep" ? "SEK BIS START" : phase === "pause" ? "SEK PAUSE" : `VON ${timerStart}s`}
            </div>
          </div>
        </div>
      )}

      {/* Controls */}
      <div style={{ display:"flex", gap:"16px", alignItems:"center" }}>
        <button onClick={() => { clearTimeout(ref.current); setPhase("prep"); setTimerStart(5); setTimerSek(5); setRunning(true); }}
          style={{ width:"56px", height:"56px", borderRadius:"50%", border:`1.5px solid ${T.cardBorder}`, background:T.card, color:T.textSub, cursor:"pointer", fontSize:"20px", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 2px 8px rgba(0,0,0,0.08)" }}>↺</button>
        {phase !== "manual" && (
          <button onClick={() => setRunning(v => !v)}
            style={{ width:"80px", height:"80px", borderRadius:"50%", border:"none", background:tColor, color:"#fff", cursor:"pointer", fontSize:"28px", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:`0 4px 20px ${tColor}50`, transition:"background 0.4s" }}>
            {running ? "⏸" : "▶"}
          </button>
        )}
        <button onClick={() => { clearTimeout(ref.current); onDone(donedIds); }}
          style={{ width:"56px", height:"56px", borderRadius:"50%", border:`1.5px solid ${T.cardBorder}`, background:T.card, color:T.textSub, cursor:"pointer", fontSize:"18px", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 2px 8px rgba(0,0,0,0.08)" }}>✕</button>
      </div>
      <div style={{ marginTop:"20px", fontSize:"12px", color:T.textMuted }}>✕ Abbrechen & zurück</div>
    </div>
  );
}

// ─── SESSION VIEW ──────────────────────────────────────────────────────────
function SessionView({exercises,onComplete,savedProgress,pauseSek}){
  const phases=[...new Set(exercises.map(e=>e.phase))];
  const warmupEx = exercises.filter(e => e.phase === "Warm-Up");
  const [done,setDone]=useState(savedProgress||{});
  const [openPhase,setOpenPhase]=useState(phases[0]);
  const [overlayOpen,setOverlayOpen]=useState(false);
  const [overlayExName,setOverlayExName]=useState("");
  const [timerPhase,setTimerPhase]=useState("idle");
  const [timerStart,setTimerStart]=useState(40);
  const [timerSek,setTimerSek]=useState(40);
  const [running,setRunning]=useState(false);
  const [pendingSek,setPendingSek]=useState(40);
  const [isPause,setIsPause]=useState(false);
  const [warmupRunning, setWarmupRunning] = useState(false);
  const [overlayPerSide, setOverlayPerSide] = useState(false);
  const ref=useRef(null);

  useEffect(()=>{
    if(!running)return;
    if(timerSek>0){
      if(timerPhase==="prep" && timerSek<=3) SFX.tick();
      if(timerPhase==="work" && timerSek===10) SFX.warning();
      if(timerPhase==="work" && timerSek<=3 && timerSek>0) SFX.tick();
      if(timerPhase==="pause" && timerSek<=3 && timerSek>0) SFX.tick();
      ref.current=setTimeout(()=>setTimerSek(s=>s-1),1000);
    } else {
      if(timerPhase==="prep"){
        SFX.go();
        setTimerPhase("work");setTimerStart(pendingSek);setTimerSek(pendingSek);setIsPause(false);setRunning(true);
      } else if(timerPhase==="work"&&pauseSek>0){
        SFX.pauseStart();
        setTimerPhase("pause");setTimerStart(pauseSek);setTimerSek(pauseSek);setIsPause(true);setRunning(true);
      } else {
        SFX.gong();
        setRunning(false);setIsPause(false);
        setTimeout(()=>{ setOverlayOpen(false); setTimerPhase("idle"); }, 1200);
      }
    }
    return()=>clearTimeout(ref.current);
  },[running,timerSek,timerPhase,pendingSek,pauseSek]);

  const openTimer=(sek,exName,perSide=false)=>{
    clearTimeout(ref.current);
    setOverlayExName(exName||"");
    setOverlayPerSide(perSide);
    setPendingSek(sek);setTimerPhase("prep");setTimerStart(5);setTimerSek(5);
    setIsPause(false);setRunning(true);setOverlayOpen(true);
  };
  const closeOverlay=()=>{clearTimeout(ref.current);setRunning(false);setOverlayOpen(false);setTimerPhase("idle");setIsPause(false);};

  const total=exercises.length;
  const totalDone=Object.values(done).filter(Boolean).length;
  const progress=Math.round((totalDone/total)*100);

  const warmupAllDone = warmupEx.every(e => done[e.id]);

  return(
    <div>
      {/* Warm-Up autorun overlay */}
      {warmupRunning && (
        <WarmupOverlay
          exercises={warmupEx}
          pauseSek={20}
          onDone={(ids) => {
            setDone(p => ({ ...p, ...ids }));
            setWarmupRunning(false);
            setOpenPhase(phases[1] || phases[0]);
          }}
        />
      )}

      {overlayOpen&&<TimerOverlay timerStart={timerStart} timerSek={timerSek} running={running}
        phase={timerPhase} exName={overlayExName} isPause={isPause} perSide={overlayPerSide}
        onToggle={()=>setRunning(v=>!v)}
        onReset={()=>{clearTimeout(ref.current);if(timerPhase==="prep"){setTimerSek(5);setTimerStart(5);}else if(isPause){setTimerSek(pauseSek);setTimerStart(pauseSek);}else{setTimerSek(pendingSek);setTimerStart(pendingSek);}setRunning(false);}}
        onClose={closeOverlay}/>}

      {/* Progress */}
      <div style={{marginBottom:"16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:"13px",fontWeight:"600",color:T.textSub,fontFamily:T.font,marginBottom:"7px"}}>
          <span>{totalDone} von {total} erledigt</span>
          <span style={{color:progress===100?T.teal:T.accent}}>{progress}%</span>
        </div>
        <div style={{height:"6px",background:T.cardBorder,borderRadius:"3px"}}>
          <div style={{height:"100%",width:`${progress}%`,background:progress===100?T.teal:T.accent,borderRadius:"3px",transition:"width 0.3s"}}/>
        </div>
      </div>

      {/* Timer strip */}
      <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"12px 14px",background:T.card,borderRadius:"12px",border:`1px solid ${T.cardBorder}`,marginBottom:"14px",flexWrap:"wrap",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <span style={{fontSize:"12px",fontWeight:"700",letterSpacing:"1px",color:T.textMuted,fontFamily:T.font}}>TIMER</span>
        {[20,30,40,45,60].map(s=>(
          <button key={s} onClick={()=>openTimer(s,"")}
            style={{padding:"7px 14px",borderRadius:"8px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>{s}s</button>
        ))}
        {overlayOpen&&<button onClick={()=>setOverlayOpen(true)} style={{marginLeft:"auto",padding:"7px 14px",borderRadius:"8px",border:`1.5px solid ${isPause?"#2563a8":T.accent}30`,background:isPause?"#eff4ff":T.accentLight,color:isPause?"#2563a8":T.accent,fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:T.font}}>
          {isPause?"⏸ Pause":timerPhase==="prep"?"⏳":running?"⏱":"⏸"} {timerSek}s
        </button>}
      </div>

      {/* Phases */}
      {phases.map(phase=>{
        const phEx=exercises.filter(e=>e.phase===phase);
        const phDone=phEx.filter(e=>done[e.id]).length;
        const isOpen=openPhase===phase;
        const c=PHASE_COLORS[phase]||T.accent;
        const complete=phDone===phEx.length;
        const isWarmup = phase === "Warm-Up";
        return(
          <div key={phase} style={{marginBottom:"10px",borderRadius:"12px",overflow:"hidden",border:`1.5px solid ${isOpen?c+"50":T.cardBorder}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div onClick={()=>setOpenPhase(isOpen?null:phase)} style={{display:"flex",alignItems:"center",gap:"12px",padding:"15px 16px",background:complete?"#f0faf8":T.card,cursor:"pointer"}}>
              <div style={{width:"4px",height:"32px",background:complete?T.teal:c,borderRadius:"2px",flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:"14px",fontWeight:"700",color:complete?T.teal:c,fontFamily:T.font}}>{phase}</div>
                <div style={{fontSize:"12px",color:T.textMuted,fontFamily:T.font,marginTop:"1px"}}>{phDone}/{phEx.length} Übungen</div>
              </div>
              <span style={{fontSize:"18px",color:T.textMuted,transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
            </div>
            {isOpen&&<div style={{background:T.card}}>
              {/* Warm-Up start button */}
              {isWarmup && !warmupAllDone && (
                <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.cardBorder}`}}>
                  <button onClick={()=>setWarmupRunning(true)}
                    style={{width:"100%",padding:"14px",borderRadius:"10px",border:"none",background:c,color:"#fff",cursor:"pointer",fontSize:"15px",fontWeight:"700",fontFamily:T.font,display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
                    ▶ Warm-Up automatisch starten
                  </button>
                </div>
              )}
              {phEx.map(ex=><ExerciseCard key={ex.id} ex={ex} done={!!done[ex.id]} color={c}
                onToggle={()=>setDone(p=>({...p,[ex.id]:!p[ex.id]}))} onTimer={openTimer}/>)}
            </div>}
          </div>
        );
      })}

      <button onClick={()=>onComplete(done)}
        style={{width:"100%",marginTop:"16px",padding:"16px",borderRadius:"12px",border:"none",background:progress===100?T.accent:"#d4d0ca",color:progress===100?"#fff":T.textMuted,cursor:"pointer",fontSize:"16px",fontWeight:"700",fontFamily:T.font,transition:"all 0.2s"}}>
        {progress===100?"✓ Session abschließen":`Session abschließen (${progress}%)`}
      </button>
    </div>
  );
}

// ─── EXERCISE EDITOR ──────────────────────────────────────────────────────
function ExerciseEditor({exercises,setExercises}){
  const [editing,setEditing]=useState(null);const [form,setForm]=useState({});
  const phases=[...new Set(exercises.map(e=>e.phase))];
  const startEdit=ex=>{setEditing(ex.id);setForm({...ex});};
  const startAdd=()=>{const id=`custom-${Date.now()}`;setEditing("new");setForm({id,phase:phases[0],name:"",detail:"",emoji:"🏋️",ausfuehrung:"",warum:""});};
  const saveEdit=()=>{if(!form.name.trim())return;if(editing==="new")setExercises(p=>[...p,form]);else setExercises(p=>p.map(e=>e.id===editing?form:e));setEditing(null);};
  const iS={width:"100%",padding:"11px 13px",background:T.bg,border:`1.5px solid ${T.cardBorder}`,borderRadius:"9px",color:T.text,fontSize:"14px",outline:"none",boxSizing:"border-box",fontFamily:T.font};
  return(
    <div>
      {phases.map(phase=>(
        <div key={phase} style={{marginBottom:"18px"}}>
          <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:PHASE_COLORS[phase]||T.accent,textTransform:"uppercase",fontFamily:T.font,marginBottom:"8px"}}>{phase}</div>
          {exercises.filter(e=>e.phase===phase).map(ex=>(
            <div key={ex.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"13px 14px",background:T.card,borderRadius:"10px",marginBottom:"6px",border:`1px solid ${T.cardBorder}`}}>
              <span style={{fontSize:"20px"}}>{ex.emoji}</span>
              <div style={{flex:1}}><div style={{fontSize:"14px",fontWeight:"600",color:T.text,fontFamily:T.font}}>{ex.name}</div><div style={{fontSize:"12px",color:T.textMuted,fontFamily:T.font}}>{ex.detail}</div></div>
              <button onClick={()=>startEdit(ex)} style={{padding:"8px 14px",borderRadius:"8px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:T.font}}>✎</button>
              <button onClick={()=>setExercises(p=>p.filter(e=>e.id!==ex.id))} style={{padding:"8px 12px",borderRadius:"8px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:"#cc4444",cursor:"pointer",fontSize:"13px",fontWeight:"600",fontFamily:T.font}}>✕</button>
            </div>
          ))}
        </div>
      ))}
      {editing&&(
        <div style={{position:"fixed",inset:0,background:"rgba(245,244,242,0.95)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"16px"}}>
          <div style={{background:T.card,border:`1.5px solid ${T.cardBorder}`,borderRadius:"16px",padding:"24px",width:"100%",maxWidth:"400px",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.12)"}}>
            <div style={{fontSize:"13px",fontWeight:"700",letterSpacing:"2px",color:T.accent,marginBottom:"18px",fontFamily:T.font}}>ÜBUNG BEARBEITEN</div>
            {[["emoji","Emoji"],["name","Name"],["detail","Sets / Reps"],["ausfuehrung","Ausführung"],["warum","Kickbox-Relevanz"]].map(([field,label])=>(
              <div key={field} style={{marginBottom:"12px"}}>
                <label style={{fontSize:"11px",fontWeight:"700",color:T.textMuted,display:"block",marginBottom:"5px",letterSpacing:"1px",fontFamily:T.font}}>{label.toUpperCase()}</label>
                {field.length>6?<textarea value={form[field]||""} onChange={e=>setForm(p=>({...p,[field]:e.target.value}))} rows={3} style={{...iS,resize:"vertical"}}/>:<input value={form[field]||""} onChange={e=>setForm(p=>({...p,[field]:e.target.value}))} style={iS}/>}
              </div>
            ))}
            <div style={{marginBottom:"18px"}}>
              <label style={{fontSize:"11px",fontWeight:"700",color:T.textMuted,display:"block",marginBottom:"5px",letterSpacing:"1px",fontFamily:T.font}}>PHASE</label>
              <select value={form.phase||""} onChange={e=>setForm(p=>({...p,phase:e.target.value}))} style={iS}>
                {phases.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={saveEdit} style={{flex:1,padding:"13px",borderRadius:"10px",border:"none",background:T.accent,color:"#fff",cursor:"pointer",fontFamily:T.font,fontSize:"15px",fontWeight:"700"}}>Speichern</button>
              <button onClick={()=>setEditing(null)} style={{flex:1,padding:"13px",borderRadius:"10px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,cursor:"pointer",fontFamily:T.font,fontSize:"15px",fontWeight:"600"}}>Abbrechen</button>
            </div>
          </div>
        </div>
      )}
      <button onClick={startAdd} style={{width:"100%",padding:"13px",borderRadius:"10px",border:`1.5px dashed ${T.cardBorder}`,background:"transparent",color:T.textMuted,cursor:"pointer",fontSize:"14px",fontWeight:"600",marginTop:"8px",fontFamily:T.font}}>+ Übung hinzufügen</button>
    </div>
  );
}

// ─── STATS ────────────────────────────────────────────────────────────────
function Stats({sessions,workoutEx,stretchEx}){
  // sessions = [{id, date, type, done, rating, timestamp}, ...]
  const sorted=[...sessions].sort((a,b)=>b.timestamp-a.timestamp);
  const wCount=sessions.filter(s=>s.type==="workout").length;
  const sCount=sessions.filter(s=>s.type==="stretch").length;
  // days with both
  const dayMap={};
  sessions.forEach(s=>{if(!dayMap[s.date])dayMap[s.date]={};dayMap[s.date][s.type]=true;});
  const bothDays=Object.values(dayMap).filter(v=>v.workout&&v.stretch).length;
  // streak
  let streak=0;
  for(let i=0;i<365;i++){const d=new Date();d.setDate(d.getDate()-i);const k=toDateKey(d);if(dayMap[k])streak++;else break;}
  // exercise counts
  const exCounts={};
  sessions.forEach(s=>{Object.entries(s.done||{}).forEach(([id,val])=>{if(val)exCounts[id]=(exCounts[id]||0)+1;});});
  const allEx=[...workoutEx,...stretchEx];
  const topEx=Object.entries(exCounts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,count])=>({...allEx.find(e=>e.id===id),count})).filter(e=>e.name);
  const ratingsAll=sessions.map(s=>s.rating).filter(r=>r>0);
  const avgRating=ratingsAll.length>0?(ratingsAll.reduce((a,b)=>a+b,0)/ratingsAll.length).toFixed(1):null;
  const kS={padding:"16px",background:T.card,borderRadius:"12px",border:`1px solid ${T.cardBorder}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"};
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"22px"}}>
        {[["📅","Aktive Tage",Object.keys(dayMap).length],["🥊","Workouts",wCount],["🧘","Stretches",sCount],["⚡","Beides",bothDays]].map(([icon,label,val])=>(
          <div key={label} style={kS}>
            <div style={{fontSize:"22px",marginBottom:"7px"}}>{icon}</div>
            <div style={{fontSize:"26px",fontWeight:"700",color:T.text,fontFamily:T.font,marginBottom:"4px"}}>{val}</div>
            <div style={{fontSize:"12px",fontWeight:"600",color:T.textMuted,fontFamily:T.font,letterSpacing:"1px"}}>{label.toUpperCase()}</div>
          </div>
        ))}
      </div>
      {avgRating&&(
        <div style={{...kS,marginBottom:"22px",display:"flex",alignItems:"center",gap:"14px"}}>
          <div style={{fontSize:"32px"}}>⭐</div>
          <div>
            <div style={{fontSize:"22px",fontWeight:"800",color:T.text,fontFamily:T.font}}>{avgRating} / 5</div>
            <div style={{fontSize:"12px",fontWeight:"600",color:T.textMuted,fontFamily:T.font,letterSpacing:"1px"}}>Ø INTENSITÄT · {ratingsAll.length} SESSIONS</div>
          </div>
        </div>
      )}
      {topEx.length>0&&(
        <div style={{marginBottom:"22px"}}>
          <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",fontFamily:T.font,marginBottom:"10px"}}>Häufigste Übungen</div>
          {topEx.map((ex,i)=>(
            <div key={ex.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",background:T.card,borderRadius:"10px",marginBottom:"6px",border:`1px solid ${T.cardBorder}`}}>
              <span style={{fontSize:"12px",fontWeight:"700",color:T.textMuted,width:"20px",fontFamily:T.font}}>#{i+1}</span>
              <span style={{fontSize:"18px"}}>{ex.emoji}</span>
              <span style={{flex:1,fontSize:"14px",fontWeight:"600",color:T.text,fontFamily:T.font}}>{ex.name}</span>
              <span style={{fontSize:"14px",fontWeight:"700",color:T.accent,fontFamily:T.font}}>{ex.count}×</span>
            </div>
          ))}
        </div>
      )}
      <div>
        <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",fontFamily:T.font,marginBottom:"10px"}}>Verlauf</div>
        {sorted.length===0&&<div style={{fontSize:"14px",color:T.textMuted,textAlign:"center",padding:"28px 0",fontFamily:T.font}}>Noch keine Sessions.</div>}
        {sorted.slice(0,30).map((s,i)=>{
          // Count which session of the day this is
          const sameDaySessions=sorted.filter(x=>x.date===s.date&&x.type===s.type);
          const sessionNum=sameDaySessions.indexOf(s)+1;
          const label=s.type==="workout"?"Workout":"Stretch";
          const color=s.type==="workout"?T.accent:T.teal;
          const bg=s.type==="workout"?T.accentLight:T.tealLight;
          return(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"12px 14px",background:T.card,borderRadius:"10px",marginBottom:"6px",border:`1px solid ${T.cardBorder}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:"14px",fontWeight:"600",color:T.text,fontFamily:T.font}}>
                  {new Date(s.date+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short"})}
                </div>
                <div style={{fontSize:"11px",color:T.textMuted,fontFamily:T.font,marginTop:"2px"}}>
                  {new Date(s.timestamp).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})} Uhr
                </div>
              </div>
              {s.rating>0&&<span style={{fontSize:"12px",color:"#c47a00"}}>{"⭐".repeat(s.rating)}</span>}
              <span style={{fontSize:"12px",fontWeight:"700",color,background:bg,padding:"4px 10px",borderRadius:"20px",fontFamily:T.font}}>
                {label}{sameDaySessions.length>1?` #${sessionNum}`:""}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── SESSION COMPLETE TOAST ────────────────────────────────────────────────
function SessionToast({type, rating, doneCount, onDone}){
  const label = type==="workout"?"Workout":"Stretch";
  const color = type==="workout"?T.accent:T.teal;
  useEffect(()=>{
    const t = setTimeout(onDone, 2800);
    return ()=>clearTimeout(t);
  },[]);
  return(
    <div style={{position:"fixed",top:"24px",left:"50%",transform:"translateX(-50%)",zIndex:300,background:T.card,border:`2px solid ${color}`,borderRadius:"16px",padding:"16px 24px",boxShadow:"0 8px 32px rgba(0,0,0,0.14)",textAlign:"center",fontFamily:T.font,minWidth:"240px"}}>
      <div style={{fontSize:"28px",marginBottom:"6px"}}>{type==="workout"?"🥊":"🧘"}</div>
      <div style={{fontSize:"16px",fontWeight:"800",color:T.text,marginBottom:"4px"}}>{label} gespeichert</div>
      <div style={{fontSize:"13px",color:T.textMuted}}>
        {doneCount} Übungen · {rating>0?"⭐".repeat(rating):"kein Rating"}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("dashboard");
  // sessions = [{id, date, type, done, rating, timestamp}]
  const [sessions,setSessions]=useState([]);
  const [workoutEx,setWorkoutEx]=useState(DEFAULT_WORKOUT);
  const [stretchEx,setStretchEx]=useState(DEFAULT_STRETCH);
  const [loaded,setLoaded]=useState(false);
  const [editMode,setEditMode]=useState(null);
  const [showRating,setShowRating]=useState(null);
  const [pendingDone,setPendingDone]=useState(null);
  const [toast,setToast]=useState(null); // {type, rating, doneCount}
  const [wochenZiel,setWochenZiel]=useState({workout:4,stretch:5});
  const [pauseSek,setPauseSek]=useState(20);

  useEffect(()=>{
    (async()=>{
      const s=await load("kb4-sessions"),w=await load("kb4-workout-ex"),st=await load("kb4-stretch-ex");
      const settings=await load("kb4-settings");
      // Migrate old history format if present
      const oldHistory=await load("kb4-history");
      if(s){setSessions(s);}
      else if(oldHistory){
        // Convert old {date: {workout,stretch,...}} to session array
        const migrated=[];
        Object.entries(oldHistory).forEach(([date,val])=>{
          if(val.workout)migrated.push({id:`mig-w-${date}`,date,type:"workout",done:val.workoutDone||{},rating:val.rating||0,timestamp:new Date(date+"T10:00:00").getTime()});
          if(val.stretch)migrated.push({id:`mig-s-${date}`,date,type:"stretch",done:val.stretchDone||{},rating:val.rating||0,timestamp:new Date(date+"T11:00:00").getTime()});
        });
        setSessions(migrated);
      }
      if(w)setWorkoutEx(w);if(st)setStretchEx(st);
      if(settings){if(settings.wochenZiel)setWochenZiel(settings.wochenZiel);if(settings.pauseSek!=null)setPauseSek(settings.pauseSek);}
      setLoaded(true);
    })();
  },[]);
  useEffect(()=>{if(loaded)save("kb4-sessions",sessions);},[sessions,loaded]);
  useEffect(()=>{if(loaded)save("kb4-workout-ex",workoutEx);},[workoutEx,loaded]);
  useEffect(()=>{if(loaded)save("kb4-stretch-ex",stretchEx);},[stretchEx,loaded]);
  useEffect(()=>{if(loaded)save("kb4-settings",{wochenZiel,pauseSek});},[wochenZiel,pauseSek,loaded]);

  const requestComplete=(type,done)=>{
    setPendingDone({type,done});
    setShowRating(type);
  };
  const finishSession=(rating)=>{
    const{type,done}=pendingDone;
    const doneCount=Object.values(done).filter(Boolean).length;
    const newSession={
      id:`${type}-${Date.now()}`,
      date:today(),
      type,
      done,
      rating,
      timestamp:Date.now(),
    };
    setSessions(prev=>[...prev,newSession]);
    setShowRating(null);setPendingDone(null);
    setToast({type,rating,doneCount});
    setTab(type); // stay on workout/stretch tab, toast disappears automatically
  };

  // Derived values for dashboard
  const todaySessions=sessions.filter(s=>s.date===today());
  const todayWorkout=todaySessions.some(s=>s.type==="workout");
  const todayStretch=todaySessions.some(s=>s.type==="stretch");
  const todayRating=todaySessions.length>0?Math.max(...todaySessions.map(s=>s.rating)):0;

  // Streak
  const dayMap={};
  sessions.forEach(s=>{if(!dayMap[s.date])dayMap[s.date]={};dayMap[s.date][s.type]=true;});
  let streak=0;
  for(let i=0;i<365;i++){const d=new Date();d.setDate(d.getDate()-i);if(dayMap[toDateKey(d)])streak++;else break;}

  // This week
  const thisWeekStart=getMonday(new Date());
  const weekWorkouts=sessions.filter(s=>s.type==="workout"&&s.date>=thisWeekStart).length;
  const weekStretches=sessions.filter(s=>s.type==="stretch"&&s.date>=thisWeekStart).length;

  const tabs=[{id:"dashboard",label:"Home",icon:"⚡"},{id:"workout",label:"Workout",icon:"🥊"},{id:"stretch",label:"Stretch",icon:"🧘"},{id:"stats",label:"Stats",icon:"📊"},{id:"edit",label:"Anpassen",icon:"✎"}];

  if(!loaded)return<div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",color:T.textMuted,fontFamily:T.font,fontSize:"16px"}}>Lade…</div>;

  // Build heatmap-compatible dayMap for Heatmap component
  const heatmapHistory = {};
  sessions.forEach(s=>{
    if(!heatmapHistory[s.date])heatmapHistory[s.date]={};
    heatmapHistory[s.date][s.type]=true;
  });

  // Today's session count per type (for "Session #N" badge)
  const todayWorkoutCount=todaySessions.filter(s=>s.type==="workout").length;
  const todayStretchCount=todaySessions.filter(s=>s.type==="stretch").length;

  return(
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:T.font,paddingBottom:"72px"}}>

      {/* Rating modal */}
      {showRating&&<RatingModal onSave={finishSession} onSkip={()=>finishSession(0)}/>}

      {/* Toast */}
      {toast&&<SessionToast type={toast.type} rating={toast.rating} doneCount={toast.doneCount} onDone={()=>setToast(null)}/>}

      {/* Header */}
      <div style={{background:"#fff",borderBottom:`1px solid ${T.cardBorder}`,padding:"20px 20px 16px",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <div style={{maxWidth:"640px",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"3px",color:T.accent,textTransform:"uppercase",marginBottom:"4px"}}>Kickbox Training</div>
            <h1 style={{fontSize:"26px",fontWeight:"800",margin:0,color:T.text,letterSpacing:"-0.5px"}}>Tracker</h1>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:"13px",fontWeight:"700",color:T.textSub,fontFamily:T.font}}>
              {new Date().toLocaleDateString("de-DE",{weekday:"long"})}
            </div>
            <div style={{fontSize:"22px",fontWeight:"800",color:T.text,fontFamily:T.font,lineHeight:1.1}}>
              {new Date().toLocaleDateString("de-DE",{day:"numeric",month:"long"})}
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:"640px",margin:"0 auto",padding:"18px 16px 0"}}>

        {/* DASHBOARD */}
        {tab==="dashboard"&&(
          <div>
            {/* Wochenziel Rings */}
            <div style={{background:T.card,borderRadius:"14px",border:`1px solid ${T.cardBorder}`,padding:"20px",marginBottom:"16px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",fontFamily:T.font,marginBottom:"16px"}}>Wochenziel</div>
              <div style={{display:"flex",justifyContent:"space-around"}}>
                <WochenRing done={weekWorkouts} goal={wochenZiel.workout} label="Workouts" color={T.accent}/>
                <WochenRing done={weekStretches} goal={wochenZiel.stretch} label="Stretches" color={T.teal}/>
                <WochenRing done={weekWorkouts+weekStretches} goal={wochenZiel.workout+wochenZiel.stretch} label="Gesamt" color={T.orange}/>
              </div>
            </div>

            {/* Today cards */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
              {[{type:"workout",label:"Workout",icon:"🥊",tabId:"workout",color:T.accent,light:T.accentLight,count:todayWorkoutCount},{type:"stretch",label:"Stretch",icon:"🧘",tabId:"stretch",color:T.teal,light:T.tealLight,count:todayStretchCount}].map(item=>(
                <div key={item.type} onClick={()=>setTab(item.tabId)}
                  style={{padding:"20px 16px",background:item.count>0?item.light:T.card,borderRadius:"14px",border:`1.5px solid ${item.count>0?item.color+"50":T.cardBorder}`,cursor:"pointer",boxShadow:"0 1px 6px rgba(0,0,0,0.05)",transition:"all 0.2s"}}>
                  <div style={{fontSize:"28px",marginBottom:"8px"}}>{item.icon}</div>
                  <div style={{fontSize:"16px",fontWeight:"700",color:item.count>0?item.color:T.text,marginBottom:"4px"}}>{item.label}</div>
                  <div style={{fontSize:"13px",fontWeight:"600",color:item.count>0?item.color:T.textMuted}}>
                    {item.count>0?`✓ ${item.count}× heute`:"Noch offen →"}
                  </div>
                  {item.count>0&&todayRating>0&&<div style={{fontSize:"13px",marginTop:"4px"}}>{"⭐".repeat(todayRating)}</div>}
                </div>
              ))}
            </div>

            {/* Heatmap */}
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",marginBottom:"10px"}}>Aktivität · letztes Jahr</div>
              <div style={{padding:"16px",background:T.card,borderRadius:"14px",border:`1px solid ${T.cardBorder}`,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                <Heatmap history={heatmapHistory}/>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px"}}>
              {[["Workouts",sessions.filter(s=>s.type==="workout").length],["Stretches",sessions.filter(s=>s.type==="stretch").length],["Tage",Object.keys(heatmapHistory).length]].map(([l,v])=>(
                <div key={l} style={{padding:"14px 10px",background:T.card,borderRadius:"12px",border:`1px solid ${T.cardBorder}`,textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                  <div style={{fontSize:"26px",fontWeight:"800",color:T.accent}}>{v}</div>
                  <div style={{fontSize:"11px",fontWeight:"700",color:T.textMuted,letterSpacing:"1px",marginTop:"4px"}}>{l.toUpperCase()}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="workout"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
              <div>
                <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"2px",color:T.accent,marginBottom:"4px"}}>CALISTHENICS · 35–45 MIN</div>
                <div style={{fontSize:"22px",fontWeight:"800",color:T.text}}>Full Body Workout</div>
              </div>
              {todayWorkoutCount>0&&<span style={{fontSize:"13px",fontWeight:"700",color:T.teal,background:T.tealLight,padding:"6px 12px",borderRadius:"20px"}}>{todayWorkoutCount}× heute ✓</span>}
            </div>
            <SessionView exercises={workoutEx} savedProgress={null} pauseSek={pauseSek} onComplete={done=>requestComplete("workout",done)}/>
          </div>
        )}

        {tab==="stretch"&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
              <div>
                <div style={{fontSize:"11px",fontWeight:"700",letterSpacing:"2px",color:T.teal,marginBottom:"4px"}}>MOBILITY · 20–25 MIN</div>
                <div style={{fontSize:"22px",fontWeight:"800",color:T.text}}>Daily Stretch Routine</div>
              </div>
              {todayStretchCount>0&&<span style={{fontSize:"13px",fontWeight:"700",color:T.teal,background:T.tealLight,padding:"6px 12px",borderRadius:"20px"}}>{todayStretchCount}× heute ✓</span>}
            </div>
            <SessionView exercises={stretchEx} savedProgress={null} pauseSek={pauseSek} onComplete={done=>requestComplete("stretch",done)}/>
          </div>
        )}

        {tab==="stats"&&(
          <div>
            <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",marginBottom:"16px"}}>Statistiken & Verlauf</div>
            <Stats sessions={sessions} workoutEx={workoutEx} stretchEx={stretchEx}/>
          </div>
        )}

        {tab==="edit"&&(
          <div>
            {/* Settings: weekly goals + pause */}
            <div style={{background:T.card,borderRadius:"14px",border:`1px solid ${T.cardBorder}`,padding:"20px",marginBottom:"20px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",fontFamily:T.font,marginBottom:"16px"}}>Einstellungen</div>

              {/* Wochenziele */}
              <div style={{marginBottom:"16px"}}>
                <div style={{fontSize:"13px",fontWeight:"700",color:T.text,fontFamily:T.font,marginBottom:"10px"}}>Wochenziel</div>
                {[["Workouts pro Woche","workout",T.accent],[" Stretches pro Woche","stretch",T.teal]].map(([label,key,color])=>(
                  <div key={key} style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"10px"}}>
                    <div style={{flex:1,fontSize:"13px",color:T.textSub,fontFamily:T.font}}>{label}</div>
                    <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                      <button onClick={()=>setWochenZiel(p=>({...p,[key]:Math.max(1,p[key]-1)}))
                      } style={{width:"36px",height:"36px",borderRadius:"8px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,cursor:"pointer",fontSize:"18px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <div style={{width:"36px",textAlign:"center",fontSize:"18px",fontWeight:"800",color:color,fontFamily:T.font}}>{wochenZiel[key]}</div>
                      <button onClick={()=>setWochenZiel(p=>({...p,[key]:Math.min(7,p[key]+1)}))} style={{width:"36px",height:"36px",borderRadius:"8px",border:`1.5px solid ${T.cardBorder}`,background:T.bg,color:T.textSub,cursor:"pointer",fontSize:"18px",fontWeight:"700",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>
                ))}
              </div>

              {/* Pause duration */}
              <div>
                <div style={{fontSize:"13px",fontWeight:"700",color:T.text,fontFamily:T.font,marginBottom:"10px"}}>Automatische Pause nach Timer</div>
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                  {[0,10,15,20,30,45].map(s=>(
                    <button key={s} onClick={()=>setPauseSek(s)}
                      style={{padding:"9px 16px",borderRadius:"9px",border:`1.5px solid ${pauseSek===s?T.orange:T.cardBorder}`,background:pauseSek===s?T.orangeLight:T.bg,color:pauseSek===s?T.orange:T.textSub,cursor:"pointer",fontSize:"13px",fontWeight:"700",fontFamily:T.font}}>
                      {s===0?"Aus":`${s}s`}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:"12px",color:T.textMuted,fontFamily:T.font,marginTop:"8px"}}>{pauseSek>0?`Nach jeder Übung: ${pauseSek} Sek. Pause automatisch.`:"Kein automatischer Pause-Timer."}</div>
              </div>
            </div>

            {/* Exercise editor */}
            <div style={{fontSize:"12px",fontWeight:"700",letterSpacing:"2px",color:T.textMuted,textTransform:"uppercase",marginBottom:"14px"}}>Übungen anpassen</div>
            <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
              {[["workout","🥊 Workout"],["stretch","🧘 Stretch"]].map(([mode,label])=>(
                <button key={mode} onClick={()=>setEditMode(mode)} style={{flex:1,padding:"12px",borderRadius:"10px",border:`1.5px solid ${editMode===mode?T.accent:T.cardBorder}`,background:editMode===mode?T.accentLight:T.card,color:editMode===mode?T.accent:T.textSub,cursor:"pointer",fontSize:"14px",fontWeight:"700",fontFamily:T.font}}>{label}</button>
              ))}
            </div>
            {/* Reset exercises */}
            <div style={{marginTop:"20px",background:"#fff5f5",border:`1.5px solid #fca5a5`,borderRadius:"14px",padding:"16px 20px"}}>
              <div style={{fontSize:"13px",fontWeight:"700",color:T.accent,fontFamily:T.font,marginBottom:"6px"}}>Übungsdaten zurücksetzen</div>
              <div style={{fontSize:"12px",color:T.textSub,fontFamily:T.font,marginBottom:"12px"}}>Setzt Workout und Stretch auf die aktuellen Standard-Übungen zurück. Dein Verlauf und deine Statistiken bleiben erhalten.</div>
              <button onClick={()=>{
                if(window.confirm("Übungen wirklich zurücksetzen? Eigene Änderungen gehen verloren.")){
                  setWorkoutEx(DEFAULT_WORKOUT);
                  setStretchEx(DEFAULT_STRETCH);
                }
              }} style={{padding:"10px 20px",borderRadius:"9px",border:"none",background:T.accent,color:"#fff",cursor:"pointer",fontSize:"13px",fontWeight:"700",fontFamily:T.font}}>
                ↺ Übungen zurücksetzen
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.navBg,borderTop:`1px solid ${T.navBorder}`,display:"flex",zIndex:50,boxShadow:"0 -2px 10px rgba(0,0,0,0.06)"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:1,padding:"10px 4px 13px",border:"none",background:"transparent",color:tab===t.id?T.accent:T.textMuted,cursor:"pointer",fontFamily:T.font,borderTop:`3px solid ${tab===t.id?T.accent:"transparent"}`,transition:"all 0.15s"}}>
            <div style={{fontSize:"18px",marginBottom:"3px"}}>{t.icon}</div>
            <div style={{fontSize:"10px",fontWeight:"700",letterSpacing:"0.5px"}}>{t.label.toUpperCase()}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
